# ========================
# 开发环境配置（DEV）
# ========================
app:
  post:
    allowed-image-domains:
      - "http://localhost:9000/health-community-dev/"        # 本地 MinIO




spring:
  # 数据源（H2）
  datasource:
    url: jdbc:h2:file:./data/community_dev;MODE=MySQL;AUTO_SERVER=TRUE;
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  # 关键！！！Flyway 必须放在这里，让它使用 dev 数据源
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false   # 开发环境允许清空

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate  # 保持校验，不自动建表，交给 Flyway
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  error:
    include-stacktrace: always
    include-message: always

logging:
  level:
    root: info
    com.health.community: debug
    org.hibernate.SQL: debug
    org.hibernate.type: trace
    org.springframework.transaction: debug

springdoc:
  swagger-ui:
    enabled: true

jwt:
  secret: devSecretKeyForLocalTesting1234567890