# ========================
# 公共配置（所有环境共享）
# ========================

spring:
  application:
    name: community
  mvc:
    format:
      date: yyyy-MM-dd
  servlet:
    multipart:
      max-file-size: 10MB    # 单个文件最大
      max-request-size: 10MB # 整个请求最大（多文件总和）
      enabled: true          # 默认 true


  # 多环境配置
  profiles:
    default: dev  # 默认开发环境

  # JPA 通用配置
  jpa:
    show-sql: true
    open-in-view: false  # 建议关闭，避免LazyInitializationException
    properties:
      hibernate:
        format_sql: true
        default_schema: PUBLIC
        globally_quoted_identifiers: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

    elasticsearch:
      uris: http://localhost:9200

# 日志格式（所有环境统一）
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    org.flywaydb: DEBUG

app:
  cors:
    allowed-origins:
      - "http://localhost:5173"
      - "http://localhost:3000"
      - "http://localhost:5175"
  base-url: http://localhost:8080
  minio:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: password123
    bucket: health-community-dev
  file:
    upload:
      max-file-size: 10485760   # 10MB，单位：字节（也可以写 10MB，但需自定义转换器）
      # max-request-size: 52428800 # 50MB
    cdn-domain: http://localhost:9000/health-community-dev
jwt:
  token-header: authorization
  short-ttl: 7200000
  long-ttl: 2592000000

boohee:
  api:
    base-url: https://fc.boohee.com/api
    app-id: ${BOOHEE_APP_ID}
    app-key: ${BOOHEE_APP_KEY}  # 推荐从环境变量读取