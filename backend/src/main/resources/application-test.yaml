# ========================
# 测试环境配置（TEST）
# ========================
app:
  post:
    allowed-image-domains:
      - "http://localhost:9000/health-community-test/"        # 本地 MinIO
  food:
    allowed-image-domains:
      - "http://localhost:9000/health-community-test/"        # 本地 MinIO
      - "https://f.boohee.cn/"  #薄荷
  base-url: http://localhost:8080
  minio:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: password123
    bucket: health-community-test
    sign-expire-seconds: 600
  file:
    upload:
      max-file-size: 10485760   # 10MB，单位：字节（也可以写 10MB，但需自定义转换器）


spring:
  # 数据源（Mysql）
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/community?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 20000
      max-lifetime: 1800000
      validation-timeout: 3000
      connection-test-query: SELECT 1

  # 关键！！！Flyway 必须放在这里，让它使用 dev 数据源
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false   # 开发环境允许清空

  # JPA

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        type:
          preferred_enum_jdbc_type: VARCHAR
        jdbc:
          time_zone: Asia/Shanghai


server:
  port: 8080
  error:
    include-stacktrace: always
    include-message: always

  servlet:
    # 关闭默认安全头（仅测试环境！）
    headers:
      frame-options:
        enabled: false

logging:
  level:
    root: info
    com.health.community: debug
    org.hibernate.SQL: debug
    org.hibernate.type: trace
    org.springframework.transaction: debug
    com.zaxxer.hikari: DEBUG

springdoc:
  swagger-ui:
    enabled: true

jwt:
  secret: testSecretKeyForLocalTesting1234567890

# 测试/CI 可不配薄荷密钥；未配置时 FoodService 仅查 ES，不调三方
boohee:
  api:
    app-id: ${BOOHEE_APP_ID:}
    app-key: ${BOOHEE_APP_KEY:}